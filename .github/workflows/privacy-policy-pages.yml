name: Privacy Policy Pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/privacy-policy-pages.yml"
      - "web/privacy-policy/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: privacy-policy-pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy privacy policy page
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}privacy-policy/

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

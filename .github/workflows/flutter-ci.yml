name: Flutter CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Analyze, test, and release build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Test
        run: flutter test --reporter=compact

      - name: Configure Android release signing
        env:
          WORKLEDGER_RELEASE_KEYSTORE_BASE64: ${{ secrets.WORKLEDGER_RELEASE_KEYSTORE_BASE64 }}
          WORKLEDGER_RELEASE_STORE_FILE: workledger-upload-keystore.jks
          WORKLEDGER_RELEASE_STORE_PASSWORD: ${{ secrets.WORKLEDGER_RELEASE_STORE_PASSWORD }}
          WORKLEDGER_RELEASE_KEY_ALIAS: ${{ secrets.WORKLEDGER_RELEASE_KEY_ALIAS }}
          WORKLEDGER_RELEASE_KEY_PASSWORD: ${{ secrets.WORKLEDGER_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          missing_values=()
          for value_name in \
            WORKLEDGER_RELEASE_KEYSTORE_BASE64 \
            WORKLEDGER_RELEASE_STORE_PASSWORD \
            WORKLEDGER_RELEASE_KEY_ALIAS \
            WORKLEDGER_RELEASE_KEY_PASSWORD
          do
            if [ -z "${!value_name:-}" ]; then
              missing_values+=("$value_name")
            fi
          done

          if [ "${#missing_values[@]}" -gt 0 ]; then
            printf 'Missing Android release signing secrets: %s\n' "${missing_values[*]}" >&2
            exit 1
          fi

          printf '%s' "$WORKLEDGER_RELEASE_KEYSTORE_BASE64" \
            | base64 --decode > "android/app/$WORKLEDGER_RELEASE_STORE_FILE"
          chmod 600 "android/app/$WORKLEDGER_RELEASE_STORE_FILE"

          {
            printf 'WORKLEDGER_RELEASE_STORE_FILE=%s\n' "$WORKLEDGER_RELEASE_STORE_FILE"
            printf 'WORKLEDGER_RELEASE_STORE_PASSWORD=%s\n' "$WORKLEDGER_RELEASE_STORE_PASSWORD"
            printf 'WORKLEDGER_RELEASE_KEY_ALIAS=%s\n' "$WORKLEDGER_RELEASE_KEY_ALIAS"
            printf 'WORKLEDGER_RELEASE_KEY_PASSWORD=%s\n' "$WORKLEDGER_RELEASE_KEY_PASSWORD"
          } > android/key.properties
          chmod 600 android/key.properties

      - name: Build release APK
        run: flutter build apk --release

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Print release artifact hashes
        run: |
          shasum -a 256 \
            build/app/outputs/flutter-apk/app-release.apk \
            build/app/outputs/bundle/release/app-release.aab
